<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Not found — brat.gg</title>
    <meta
      name="description"
      content="A playful custom 404 page for brat.gg — a quiet forest-elven corner of the web."
    />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#0d1410" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero hero-grid">
        <div class="hero-copy">
          <p class="eyebrow">404 · wrong trail</p>
          <h1>Lost already?</h1>
          <p class="lede">That page isn’t here. Maybe the woods ate it.</p>
          <p>
            You took a wrong turn somewhere in my little forest. It happens.
            Try not to wander off too far before I have to come drag you back.
          </p>
          <p class="status-line">
            <span>Best move</span>
            head back home before you get any more distracted
          </p>
          <p>
            <a href="/">Back home</a>
          </p>
        </div>

        <div class="hero-portrait-wrap">
          <img
            class="hero-portrait"
            src="/assets/aria-portrait.png"
            alt="Portrait of Aria in a quiet forest"
          />
        </div>
      </section>
    </main>
  </body>
</html>
